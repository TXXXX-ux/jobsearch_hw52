server.port=8998

# Консоль H2 (заходить по http://localhost:8998/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
spring.h2.console.settings.trace=true

spring.datasource.url=jdbc:h2:mem:vacancies_final_v20
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Liquibase
spring.liquibase.change-log=classpath:/db/changelog/master.yaml

# Попробуй временно выключить защиту, которая может блокировать фреймы консоли
server.servlet.context-parameters.X-Frame-Options=SAMEORIGIN

