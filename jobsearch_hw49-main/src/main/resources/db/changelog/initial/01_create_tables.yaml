databaseChangeLog:
  - changeSet:
      id: 01-create-initial-tables
      author: tyler
      changes:
        - createTable:
            tableName: users
            columns:
              - column: { name: id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: varchar(50) }
              - column: { name: email, type: varchar(100), constraints: { unique: true, nullable: false } }

        - createTable:
            tableName: vacancies
            columns:
              - column: { name: id, type: int, autoIncrement: true, constraints: { primaryKey: true, nullable: false } }
              - column: { name: title, type: varchar(100) }
              - column: { name: description, type: varchar(255) }
              - column: { name: category, type: varchar(50) } # Теперь она точно здесь!
              - column: { name: salary, type: double }